services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # ── Liga/desliga o crawler sem derrubar o container ──
      CRAWLER_ENABLED: ${CRAWLER_ENABLED:-false}

      # ── Quantidade de workers ────────────────────────────
      CONCURRENT_REQUESTS: ${CONCURRENT_REQUESTS:-20}
      CRAWLER_BATCH_SIZE: ${CRAWLER_BATCH_SIZE:-40}
      PLAYWRIGHT_WORKERS: ${PLAYWRIGHT_WORKERS:-1}

      # ── Banco de dados ───────────────────────────────────
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      # ── Embedding API ────────────────────────────────────
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://ai.micaelmuniz.com/api/embed}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}

      # ── Comportamento do crawler ─────────────────────────
      CRAWL_DELAY_MS: ${CRAWL_DELAY_MS:-1000}
      MAX_DEPTH: ${MAX_DEPTH:-3}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-15}
      CRAWLER_CONCURRENCY: ${CRAWLER_CONCURRENCY:-20}
      WATCHDOG_TIMEOUT_MINUTES: ${WATCHDOG_TIMEOUT_MINUTES:-5}

    # Playwright precisa de memória extra por instância
    # 1 light async + 1 playwright + overhead
    mem_limit: 1500m
    mem_reservation: 512m

    # Shm necessário pro Chromium não crashar
    shm_size: 256mb

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: false